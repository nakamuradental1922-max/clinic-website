<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>院長紹介｜中村歯科医院</title>

    <style>
        body {
            font-family: "Hiragino Sans", sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.8;
            background: #f9f9f9;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        .profile img {
            width: 260px;
            border-radius: 8px;
        }

        .profile-text {
            flex: 1;
        }

        h2 {
            margin-top: 30px;
            border-left: 4px solid #007bff;
            padding-left: 10px;
        }

        ul {
            padding-left: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>院長紹介</h1>

    <div class="profile">
        <!-- 院長写真（必要なら差し替え） -->
        <img src="https://via.placeholder.com/260x340?text=Doctor+Photo" alt="院長写真">

        <div class="profile-text">
            <h2>院長　中村 翔</h2>
            <p>
                患者さん一人ひとりの健康と人生に寄り添い、  
                「病気の原因を見つけ、健康を維持するための歯科医療」を大切にしています。  
                基本に忠実で、まじめな診療を心がけています。
            </p>
        </div>
    </div>

    <h2>経歴</h2>
    <ul>
        <li>◯◯大学歯学部 卒業</li>
        <li>◯◯歯科医院 勤務</li>
        <li>中村歯科医院 開院</li>
    </ul>

    <h2>資格・所属</h2>
    <ul>
        <li>日本歯科医師会 会員</li>
        <li>スポーツデンティスト</li>
        <li>その他資格など</li>
    </ul>

</div>
<div style="text-align:center; margin-top:40px;">
    <a href="index.html" 
       style="display:inline-block; padding:12px 24px; background:#007bff; color:#fff; 
              text-decoration:none; border-radius:6px;">
        トップページに戻る
    </a>
</div>
    
</body>
</html>
